name: Discord Alert - Build & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint || true

    - name: Build project
      run: npm run build

    - name: Determine notification type
      id: notification
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          EVENT_TYPE="PUSH"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
        else
          EVENT_TYPE="PULL REQUEST"
          BRANCH="${{ github.head_ref }}"
          COMMIT_MSG="${{ github.event.pull_request.title }}"
          COMMIT_AUTHOR="${{ github.event.pull_request.user.login }}"
          COMMIT_URL="${{ github.event.pull_request.html_url }}"
        fi
        echo "event_type=${EVENT_TYPE}" >> $GITHUB_OUTPUT
        echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
        echo "commit_msg=${COMMIT_MSG}" >> $GITHUB_OUTPUT
        echo "author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT
        echo "url=${COMMIT_URL}" >> $GITHUB_OUTPUT

    - name: Send Discord notification
      if: always()
      uses: tsickert/discord-webhook@v5.3.0
      with:
        webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
        content: |
          **🚀 GitHub Actions Alert - PUCPR DevOps**
          
          **Event Type:** ${{ steps.notification.outputs.event_type }}
          **Branch:** ${{ steps.notification.outputs.branch }}
          **Author:** ${{ steps.notification.outputs.author }}
          **Status:** ${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }}
          
          **Message:** ${{ steps.notification.outputs.commit_msg }}
          **Commit Link:** [${{ github.sha }}](${{ steps.notification.outputs.url }})
          
          **Repository:** ${{ github.repository }}
          **Workflow:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
